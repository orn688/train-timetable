name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # Pushes made by another workflow using the default GITHUB_TOKEN do not
  # trigger `push` events (GitHub blocks this to prevent recursion), so we
  # chain off Update Train Schedule's completion to deploy its commits.
  workflow_run:
    workflows: ["Update Train Schedule"]
    types: [completed]
    branches: [main]

# We publish by committing the built site to the gh-pages branch, so the
# workflow needs write access to repository contents.
permissions:
  contents: write

# Serialize every workflow that pushes to gh-pages (this one and the preview
# workflow's publish job) under a single group, so a production deploy and a
# preview tear-down can't both try to update the branch at the same time.
concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # workflow_run fires on any completion (including failure/cancelled), so
    # gate the build on a successful upstream run. Other event types (push,
    # workflow_dispatch) always proceed.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages (site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # keep_files preserves the pr-preview/ directory (managed by the
          # preview workflow) instead of wiping it on every production deploy.
          # Trade-off: old hashed assets under assets/ are not garbage-collected
          # and accumulate slowly; index.html always points at the current ones.
          keep_files: true
