name: Deploy PR previews

on:
  pull_request:
    # `closed` is included so the preview is torn down when the PR is merged
    # or closed. Note: previews only deploy for branches pushed to this repo,
    # not for PRs from forks (those get a read-only token and can't publish).
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write        # push the preview to the gh-pages branch
  pull-requests: write   # post/update the preview-URL comment

# One in-flight deploy per PR; a new push supersedes an older, still-running one.
concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        # The preview is served from a subpath, so the build's base must match
        # it exactly or the JS/CSS will 404:
        #   https://orn688.github.io/train-timetable/pr-preview/pr-<N>/
        run: npm run build -- --base=/train-timetable/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview
        # Publishes ./dist to gh-pages under pr-preview/pr-<N>/, comments the
        # preview URL on the PR, and removes the directory when the PR closes.
        # Leaves the rest of the gh-pages branch (the production site) untouched.
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist/
